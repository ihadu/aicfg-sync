# AI 编程工具配置同步映射
# 定义每个工具需要同步的文件/目录
# 路径支持 ~ 展开为 HOME 目录

[settings]
# push 时的默认冲突策略: "keep-local", "keep-icloud", "interactive"
push_default = "keep-local"
# pull 时的默认冲突策略
pull_default = "keep-icloud"
# 是否启用语义合并（JSON/TOML 非重叠 key 自动合并）
merge_enabled = true

[tools.kimi]
name = "Kimi Code CLI"
files = [
    { source = "~/.kimi/config.toml", target = "kimi/config.toml" },
]

[tools.claude]
name = "Claude Code"
files = [
    { source = "~/.claude/settings.json", target = "claude/settings.json" },

    { source = "~/.claude/claude.md", target = "claude/claude.md" },
    { source = "~/.claude/skills/", target = "claude/skills/", exclude = [] },
    { source = "~/.claude/hooks/", target = "claude/hooks/", exclude = [] },
    { source = "~/Library/Application Support/Claude/claude_desktop_config.json", target = "claude/claude_desktop_config.json" },
    { source = "~/Library/Application Support/Claude-3p/claude_desktop_config.json", target = "claude/claude_3p_desktop_config.json" },
]

[tools.codex]
name = "Codex CLI"
files = [
    { source = "~/.codex/config.toml", target = "codex/config.toml" },
    { source = "~/.codex/hooks.json", target = "codex/hooks.json" },
    { source = "~/.codex/AGENTS.md", target = "codex/AGENTS.md" },
    { source = "~/.codex/skills/", target = "codex/skills/", exclude = [] },
]

[tools.opencode]
name = "OpenCode Desktop"
files = [
    { source = "~/Library/Application Support/ai.opencode.desktop/opencode.global.dat", target = "opencode/opencode.global.dat" },
    { source = "~/Library/Application Support/ai.opencode.desktop/opencode.settings.dat", target = "opencode/opencode.settings.dat" },
]

# 历史记录映射（大文件，单独同步）
[history.claude]
name = "Claude Code History"
files = [
    { source = "~/.claude/history.jsonl", target = "history/claude/history.jsonl" },
]

[history.kimi]
name = "Kimi Code CLI Sessions"
files = [
    { source = "~/.kimi/sessions/", target = "history/kimi/sessions/" },
]

[history.codex]
name = "Codex CLI History"
files = [
    { source = "~/.codex/history.jsonl", target = "history/codex/history.jsonl" },
]
